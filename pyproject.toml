[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [
    "data",
    "frontend",
    "supabase",
    ".vercel",
    "build",
    "dist",
    "src/app/streamlit_app.py",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "I",
    "B",
    "UP",
]
ignore = [
    "E402",
    "E501",
    "E701",
    "E702",
    "E741",
    "B008",
    "UP007",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F841", "B011"]
"src/collectors/*" = ["B007"]
