name: Refresh Opportunity Data

on:
  schedule:
    - cron: '0 6 * * 1,4'  # Monday & Thursday at 6am UTC
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data refresh (quick mode)
        run: python -m src.collectors.refresh_all --no-deep

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/processed/opportunities.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/opportunities.json
          TOTAL=$(python3 -c "import json; print(len(json.load(open('data/processed/opportunities.json'))))")
          git commit -m "chore: auto-refresh opportunity data ($TOTAL total)"
          git push
