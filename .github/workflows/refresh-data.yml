name: Refresh Opportunity Data

on:
  schedule:
    - cron: '0 6 * * 1'    # Monday 6am UTC — deep scrape + enrich
    - cron: '0 6 * * 4'    # Thursday 6am UTC — quick refresh
  workflow_dispatch:
    inputs:
      deep:
        description: 'Run deep scrape of detail pages'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine scrape mode
        id: mode
        run: |
          if [[ "${{ github.event.schedule }}" == "0 6 * * 1" ]] || [[ "${{ inputs.deep }}" == "true" ]]; then
            echo "deep=true" >> $GITHUB_OUTPUT
          else
            echo "deep=false" >> $GITHUB_OUTPUT
          fi

      - name: Run data refresh
        run: |
          if [[ "${{ steps.mode.outputs.deep }}" == "true" ]]; then
            echo "Running DEEP refresh (Monday or manual)"
            python -m src.collectors.refresh_all
          else
            echo "Running QUICK refresh (Thursday)"
            python -m src.collectors.refresh_all --no-deep
          fi

      - name: Retroactive enricher pass
        run: python -m src.normalizers.enrich_processed --save

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/processed/opportunities.json data/processed/collector_status.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/opportunities.json data/processed/collector_status.json
          TOTAL=$(python3 -c "import json; print(len(json.load(open('data/processed/opportunities.json'))))")
          EMAILS=$(python3 -c "import json; d=json.load(open('data/processed/opportunities.json')); print(sum(1 for o in d if o.get('contact_email')))")
          INACTIVE=$(python3 -c "import json; d=json.load(open('data/processed/opportunities.json')); print(sum(1 for o in d if o.get('metadata',{}).get('is_active') is False))")
          MODE="${{ steps.mode.outputs.deep == 'true' && 'deep' || 'quick' }}"
          git commit -m "chore: auto-refresh opportunity data ($TOTAL total, $EMAILS emails, $INACTIVE inactive, $MODE mode)"
          git push
