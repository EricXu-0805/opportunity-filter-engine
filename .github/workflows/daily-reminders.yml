name: daily-reminders

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Fire reminder cron
        run: |
          if [ -z "${{ secrets.BACKEND_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "BACKEND_URL or CRON_SECRET secret not set — skipping"
            exit 0
          fi
          curl -sfSL \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.BACKEND_URL }}/api/cron/reminders"

      - name: Data-quality health check
        if: env.ADMIN_TOKEN != '' && env.RESEND_API_KEY != ''
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPERATOR_EMAIL: ${{ secrets.OPERATOR_EMAIL }}
        run: |
          if [ -z "${{ secrets.BACKEND_URL }}" ]; then exit 0; fi
          BODY=$(curl -sf -H "X-Admin-Token: $ADMIN_TOKEN" \
                 "${{ secrets.BACKEND_URL }}/api/admin/health-check") || exit 0
          OK=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('ok', True))")
          if [ "$OK" = "True" ]; then
            echo "Health check ok — no alerts"
            exit 0
          fi
          if [ -z "$OPERATOR_EMAIL" ]; then
            echo "Alerts present but OPERATOR_EMAIL not set — printing to logs:"
            echo "$BODY"
            exit 0
          fi
          ALERTS=$(echo "$BODY" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          lines = [f\"- [{a['level']}] {a['message']}\" for a in d.get('alerts', [])]
          print('\\n'.join(lines))
          ")
          curl -sf -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"OpportunityEngine <onboarding@resend.dev>\",
              \"to\": [\"$OPERATOR_EMAIL\"],
              \"subject\": \"OpportunityEngine: data-quality alert\",
              \"text\": \"The daily health-check found anomalies:\n\n$ALERTS\n\nDashboard: ${{ secrets.FRONTEND_URL }}/admin\"
            }" || true
